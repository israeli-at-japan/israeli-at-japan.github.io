<style>
    .chat-container { max-width: 600px; margin: 20px auto; font-family: sans-serif; direction: rtl; }
    .chat-box { border: 1px solid #ccc; padding: 15px; border-radius: 8px; background: #f9f9f9; }
    .input-group { margin-bottom: 10px; display: flex; gap: 10px; }
    select, input, button { padding: 8px; font-size: 16px; }
    input { flex-grow: 1; }
    button { cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
    #ai-response { margin-top: 15px; white-space: pre-wrap; font-size: 15px; line-height: 1.5; }
    .loading { color: #666; font-style: italic; display: none; }
</style>

<div class="chat-container">
    <div class="chat-box">
        <h3>שאל את צוות המומחים שלנו! 🇯🇵</h3>
        
        <div class="input-group">
            <select id="agent-mode">
                <option value="general">מיקה (סוכנת טיולים והמלצות)</option>
                <option value="history">משה (מומחה היסטוריה ותרבות)</option>
            </select>
        </div>

        <div class="input-group">
            <input type="text" id="user-question" placeholder="למשל: מה כדאי לעשות בקיוטו?">
            <button onclick="askJapanAI()">שאל</button>
        </div>

        <div id="loading-msg" class="loading">הסוכן חושב, זה יכול לקחת כמה שניות...</div>
        <div id="ai-response"></div>
    </div>
</div>

<script>
    async function askJapanAI() {
        const questionInput = document.getElementById('user-question').value;
        const modeSelect = document.getElementById('agent-mode').value;
        const responseDiv = document.getElementById('ai-response');
        const loadingMsg = document.getElementById('loading-msg');

        if (!questionInput.trim()) return;

        // מנקה תשובה קודמת ומציג טעינה
        responseDiv.innerHTML = '';
        loadingMsg.style.display = 'block';

        try {
            // שולח את הבקשה לשרת שלך ב-Render
            const response = await fetch('https://japan-ai-backend-mfjd.onrender.com/ask', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify({
                    question: questionInput,
                    mode: modeSelect
                })
            });

            if (!response.ok) {
                throw new Error('שגיאה בתקשורת עם השרת');
            }

            const data = await response.json();
            
            // מאחדים את הפאזל שהשרת שלח לטקסט אחד רציף
            let textToFormat = "";

            if (Array.isArray(data.answer)) {
                // אם קיבלנו רשימה של חלקים, נעבור עליהם אחד אחד
                data.answer.forEach(item => {
                    if (typeof item === 'string') {
                        // אם זה טקסט רגיל (כמו האותיות הבודדות) - נוסיף אותו
                        textToFormat += item;
                    } else if (item && item.text) {
                        // אם זה האובייקט עם התשובה המרכזית - נוציא ממנו את הטקסט ונוסיף
                        textToFormat += item.text;
                    }
                });
            } else if (typeof data.answer === 'string') {
                // למקרה שבעתיד השרת פתאום ישלח טקסט רגיל
                textToFormat = data.answer;
            } else {
                textToFormat = "התקבלה תשובה בפורמט לא מוכר.";
            }

            // מוסיפים ירידות שורה לפני הלינקים
            let formattedAnswer = textToFormat.replace(/🔗/g, '<br><br>🔗');
            
            responseDiv.innerHTML = formattedAnswer;

        } catch (error) {
            responseDiv.innerHTML = `<span style="color:red;">אופס! משהו השתבש. נסה שוב מאוחר יותר.</span>`;
            console.error('Error:', error);
        } finally {
            // מסתיר את הודעת הטעינה
            loadingMsg.style.display = 'none';
        }
    }
</script>
