<style>
    .chat-container { max-width: 600px; margin: 20px auto; font-family: sans-serif; direction: rtl; }
    .chat-box { border: 1px solid #ccc; padding: 15px; border-radius: 8px; background: #f9f9f9; }
    .input-group { margin-bottom: 10px; display: flex; gap: 10px; }
    select, input, button { padding: 8px; font-size: 16px; }
    input { flex-grow: 1; }
    button { cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
    #ai-response { margin-top: 15px; white-space: pre-wrap; font-size: 15px; line-height: 1.5; }
    .loading { color: #666; font-style: italic; display: none; }
</style>

<div class="chat-container">
    <div class="chat-box">
        <h3>שאל את צוות המומחים שלנו! 🇯🇵</h3>
        
        <div class="input-group">
            <select id="agent-mode">
                <option value="general">מיקה (סוכנת טיולים והמלצות)</option>
                <option value="history">משה (מומחה היסטוריה ותרבות)</option>
            </select>
        </div>

        <div class="input-group">
            <input type="text" id="user-question" placeholder="למשל: מה כדאי לעשות בקיוטו?">
            <button onclick="askJapanAI()">שאל</button>
        </div>

        <div id="loading-msg" class="loading">הסוכן חושב, זה יכול לקחת כמה שניות...</div>
        <div id="ai-response"></div>
    </div>
</div>

<script>
    async function askJapanAI() {
        const questionInput = document.getElementById('user-question').value;
        const modeSelect = document.getElementById('agent-mode').value;
        const responseDiv = document.getElementById('ai-response');
        const loadingMsg = document.getElementById('loading-msg');

        if (!questionInput.trim()) return;

        // מנקה תשובה קודמת ומציג טעינה
        responseDiv.innerHTML = '';
        loadingMsg.style.display = 'block';

        try {
            // שולח את הבקשה לשרת שלך ב-Render
            const response = await fetch('https://japan-ai-backend-mfjd.onrender.com/ask', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify({
                    question: questionInput,
                    mode: modeSelect
                })
            });

            if (!response.ok) {
                throw new Error('שגיאה בתקשורת עם השרת');
            }

            const data = await response.json();
            
            // מאחדים את הפאזל שהשרת שלח לטקסט אחד רציף
            let textToFormat = "";

            if (Array.isArray(data.answer)) {
                // אם קיבלנו רשימה של חלקים, נעבור עליהם אחד אחד
                data.answer.forEach(item => {
                    if (typeof item === 'string') {
                        // אם זה טקסט רגיל (כמו האותיות הבודדות) - נוסיף אותו
                        textToFormat += item;
                    } else if (item && item.text) {
                        // אם זה האובייקט עם התשובה המרכזית - נוציא ממנו את הטקסט ונוסיף
                        textToFormat += item.text;
                    }
                });
            } else if (typeof data.answer === 'string') {
                // למקרה שבעתיד השרת פתאום ישלח טקסט רגיל
                textToFormat = data.answer;
            } else {
                textToFormat = "התקבלה תשובה בפורמט לא מוכר.";
            }

            // --- מתחיל פה: פילטר העיצוב החכם והמלא ---
let formattedAnswer = textToFormat;

// 1. הופך את הכוכביות (**) של ג'מיני לטקסט מודגש אמיתי ב-HTML
formattedAnswer = formattedAnswer.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

// 2. תופס לינקים של מרקדאון (במידה וג'מיני יחליט לשלוח כאלו)
formattedAnswer = formattedAnswer.replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank" style="color: #007bff; font-weight: bold;">$1</a>');

// 3. מילון הלינקים המלא של israeli-in-japan!
formattedAnswer = formattedAnswer.replace(/(?<!href=")(https:\/\/[^\s<]+)/g, function(url) {
    // מנקה פסיקים או נקודות שאולי נדבקו בטעות בסוף הלינק
    let cleanUrl = url.replace(/[.,)]$/, ''); 
    
    let title = "לכתבה המלאה לחץ כאן"; // בררת מחדל אם הלינק לא ברשימה
    
    if (cleanUrl.includes("backpackers-guide")) {
        title = "למדריך המלא לתרמילאים ביפן";
    } else if (cleanUrl.includes("fuji")) {
        title = "למדריך על אזור הר פוג'י";
    } else if (cleanUrl.includes("hiroshima-miyajima")) {
        title = "למדריך על הירושימה ומיאג'ימה";
    } else if (cleanUrl.includes("japan-info")) {
        title = "למידע כללי וטיפים חשובים ליפן";
    } else if (cleanUrl.includes("kamakura")) {
        title = "למדריך על קמאקורה";
    } else if (cleanUrl.includes("kanazawa-shirakawa")) {
        title = "למדריך על קנזאווה ושירקאווה-גו";
    } else if (cleanUrl.includes("kyoto-post")) {
        title = "למדריך המקיף על קיוטו";
    } else if (cleanUrl.includes("mat-kiso-kam")) {
        title = "למדריך על מצומוטו, עמק קיסו וקמיקוצ'י";
    } else if (cleanUrl.includes("nikko")) {
        title = "למדריך על ניקו";
    } else if (cleanUrl.includes("okayama-naoshima")) {
        title = "למדריך על אוקיאמה ונאושימה";
    } else if (cleanUrl.includes("osaka-post")) {
        title = "למדריך על אוסקה וקובה";
    } else if (cleanUrl.includes("route-planning")) {
        title = "למדריך תכנון מסלולים ביפן";
    } else if (cleanUrl.includes("tokyo-areas")) {
        title = "למדריך השכונות והאזורים בטוקיו";
    } else if (cleanUrl.includes("tokyo.html")) {
        title = "למדריך הכללי על טוקיו";
    } else if (cleanUrl.includes("uji-nara")) {
        title = "למדריך על נארה ואוג'י";
    }
    
    // מחזיר את המילה הלחיצה בעיצוב כחול ומודגש
    return `<a href="${cleanUrl}" target="_blank" style="color: #007bff; font-weight: bold; text-decoration: none;">${title}</a>`;
});

responseDiv.innerHTML = formattedAnswer;
// --- מסתיים פה ---

        } catch (error) {
            responseDiv.innerHTML = `<span style="color:red;">אופס! משהו השתבש. נסה שוב מאוחר יותר.</span>`;
            console.error('Error:', error);
        } finally {
            // מסתיר את הודעת הטעינה
            loadingMsg.style.display = 'none';
        }
    }
</script>
