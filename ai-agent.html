<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סוכן AI | ישראלי ביפן</title>
    <meta name="description" content="תכנון טיול ליפן מעולם לא היה קל יותר! התייעצו בחינם עם סוכני ה-AI שלנו, מיקה ומשה, לקבלת המלצות מסלולים, מידע תרבותי, מסעדות וטיפים מותאמים אישית.">
    
    <meta property="og:title" content="סוכן AI | ישראלי ביפן">
    <meta property="og:description" content="תכנון טיול ליפן מעולם לא היה קל יותר! התייעצו בחינם עם סוכני ה-AI שלנו לקבלת המלצות מסלולים וטיפים.">
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="canonical" href="https://israeli-in-japan.com/ai-agent" />
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* איפוס הגדרות בסיס ופונט */
        body, h1, h2, h3, p, ul, li { margin: 0; padding: 0; }
        body { font-family: 'Assistant', sans-serif; color: #3e7b73; line-height: 1.6; background-color: #fff; }
        a { text-decoration: none; color: inherit; }

        /* תפריט עליון */
        /* תפריט עליון - עדכנו פה את המיקום שיהיה דביק למחשב */
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 50px; 
            background: #fff; 
            border-bottom: 1px solid #eee; 
            position: sticky; /* הופך לדביק */
            top: 0; /* נדבק לחלק העליון */
            z-index: 1000; /* דואג שהוא תמיד ירחף מעל התוכן ולא יוסתר */
            }
            /* הסתרת תפריט הצד והכפתור במסכים גדולים */
            .side-menu, .floating-menu-btn { display: none; }
            .logo { font-size: 24px; font-weight: 600; color: #3e7b73; }
            nav ul { display: flex; list-style: none; gap: 20px; font-size: 17px; font-weight: 600; }
            nav ul li:hover { opacity: 0.7; cursor: pointer; }
            nav ul li a { color: #3e7b73; }

        #menu-placeholder {position: sticky; top: 0; z-index: 1000;}

        /* אזור הצ'אט המעוצב */
        /* אזור הצ'אט המעוצב - ללא התמונה עצמה */
        .chat-section { 
            padding: 60px 10%; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            isolation: isolate; /* שומר שהרקע שלנו לא יברח אחורה מדי */
        }

        /* יצירת שכבת רקע חכמה שמונעת קפיצות וריצודים */
        .chat-section::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('images/ai-image.png.avif'); 
            background-size: cover; 
            background-position: center center; 
            background-repeat: no-repeat;
            z-index: -1; /* דוחף את התמונה מאחורי הטקסט והתיבה */
            will-change: transform; /* אומר לכרטיס המסך לרנדר את זה בצורה חלקה */
        }
        .chat-header { text-align: center; margin-bottom: 40px; }
        .chat-header h1 { font-size: 42px; font-weight: 300; color: #3e7b73; margin-bottom: 10px; }
        .chat-header p { font-size: 20px; color: #3e7b73; opacity: 0.9; }

        /* הקופסה הלבנה המיותרת הוסרה, עכשיו זה רק עוטף בלתי נראה לרוחב */
        .chat-container { width: 100%; max-width: 800px; padding: 10px; box-sizing: border-box; }
        
        /* === תיבת החיפוש המרחפת בסגנון Gemini === */
        .gemini-input-bar {
            display: flex;
            align-items: center;
            background-color: #fff; /* התיבה עצמה לבנה ומרחפת */
            border-radius: 50px;
            padding: 8px 10px 8px 15px;
            gap: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.06); /* צל עדין שנותן עומק */
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .gemini-input-bar:focus-within {
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            border-color: #e0e0e0;
        }

        .gemini-input-bar input {
            flex-grow: 1;
            border: none;
            background: transparent;
            font-size: 17px;
            font-family: 'Assistant', sans-serif;
            color: #3e7b73;
            outline: none;
            padding: 10px 15px;
        }

        .gemini-input-bar input::placeholder {
            color: #999;
        }

        /* === בורר המומחים המעוצב (דורס את ספארי/כרום) === */
        .agent-dropdown {
            appearance: none; /* מבטל את העיצוב המכוער של מערכת ההפעלה */
            -webkit-appearance: none;
            padding: 8px 15px 8px 35px; /* מרווח שמאלי בשביל החץ */
            border-radius: 50px;
            border: 1px solid #eaeaea;
            background-color: #f9f9f9;
            font-family: 'Assistant', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: #555;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
            /* הוספת חץ מותאם אישית בצד שמאל */
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%23666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>');
            background-repeat: no-repeat;
            background-position: left 12px center;
            background-size: 14px;
        }
        
        .agent-dropdown:hover {
            border-color: #3e7b73;
            background-color: #fff;
        }

        /* כפתור שליחה עגול */
        .send-btn {
            background-color: #f0f4f9;
            color: #888;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        /* הארת כפתור השליחה כשיש טקסט */
        .gemini-input-bar.has-text .send-btn {
            background-color: #d8f0e6;
            color: #3e7b73;
        }

        .gemini-input-bar.has-text .send-btn:hover {
            background-color: #c2e2d4;
            transform: scale(1.05);
        }

        /* אזור התשובה והטעינה - עכשיו יושבים ישירות על הרקע הירוק */
        #ai-response { margin-top: 30px; font-size: 17.5px; line-height: 1.8; color: #2c5953; padding: 0 15px; }
        #ai-response strong { color: #1e403a; font-weight: 600; }
        
        .loading { color: #3e7b73; font-style: italic; display: none; text-align: center; margin-top: 20px; font-weight: 600; }

        /* התאמה לנייד */
        @media (max-width: 768px) {
            /* השארת הלוגו ממורכז למעלה והסתרת התפריט הרגיל */
            header { padding: 15px; text-align: center; display: block; }
            nav.desktop-nav { display: none; } /* מעלים את רשימת הקישורים בטלפון */
            #menu-placeholder {position: static; }/* הפקודה הזו מבטלת את הדביקות בנייד */

            .chat-section { padding: 30px 5%; }
            .chat-header h1 { font-size: 32px; }
            .chat-container { padding: 0; }
            
            /* שבירת שורות בתיבה במסכים קטנים כדי שיהיה נוח להקליד */
            .gemini-input-bar { flex-wrap: wrap; border-radius: 20px; padding: 15px; }
            .agent-dropdown { order: 2; width: auto; flex-grow: 1; text-align: right; }
            .send-btn { order: 3; }

            /* כפתור ההמבורגר הצף - ימין למעלה וממורכז */
            .floating-menu-btn {
                display: none; /* ישתנה ל-flex דרך ה-JS */
                position: fixed;
                bottom: 30px;
                right: 20px; /* שינינו לימינה */
                width: 55px;
                height: 55px;
                background-color: #3e7b73;
                color: #fff;
                border-radius: 50%;
                /* 3 השורות הבאות דואגות למרכוז מושלם של האייקון */
                display: flex; 
                justify-content: center;
                align-items: center;
                font-size: 26px;
                cursor: pointer;
                z-index: 999;
                box-shadow: 0 4px 15px rgba(0,0,0,0.2);
                transition: transform 0.2s;
            }
            .floating-menu-btn:active { transform: scale(0.95); }
        
            /* תפריט הצד המחליק */
            .side-menu {
                display: block; 
                position: fixed;
                top: 0;
                right: -300px;
                width: 260px;
                height: 100vh; /* גיבוי לדפדפנים ישנים */
                height: 100dvh; /* הגובה הדינמי החדש והמדויק */
                overflow-y: auto;
                overscroll-behavior: contain; /* מונע את ה"קפיץ" המעצבן של הטלפון */
                background-color: #fff;
                box-shadow: -5px 0 15px rgba(0,0,0,0.1);
                z-index: 1001; 
                transition: right 0.3s ease;
                padding-top: 60px;
                padding-bottom: 50px; /* מרווח נשימה כדי שהלינק האחרון לא ייתקע למטה */
            }
            /* "כרית אוויר" שקופה בתחתית הרשימה כדי לספוג את הקפיצות של ספארי */
            .side-menu ul::after {
                content: "";
                display: block;
                height: 53px; /* גובה הריבוע הבלתי נראה */
                width: 100%;
            }
            .side-menu.open { right: 0; }
            
            .side-menu ul { list-style: none; padding: 0; margin: 0; }
            .side-menu ul li { border-bottom: 1px solid #f5f5f5; }
            .side-menu ul li a {
                color: #3e7b73;
                font-size: 18px;
                font-weight: 600;
                display: block;
                padding: 15px 25px;
            }
            .side-menu-close {
                position: absolute;
                top: 15px;
                left: 20px;
                font-size: 35px;
                color: #333;
                cursor: pointer;
                line-height: 1;
            }
        }

        /* הקפאת גלילה של האתר כשהתפריט מובייל פתוח */
        body.no-scroll {
        overflow: hidden;
        }

    </style>

</head>
<body>

    <div id="menu-placeholder"></div>

    <section class="chat-section">
        <div class="chat-header">
            <h1>שאל את צוות המומחים שלנו! <span id="japan-emoji">🇯🇵</span></h1>
            <p style="margin-bottom: 10px;">הסוכנים החכמים שלנו כאן כדי לעזור לכם לתכנן את הטיול המושלם.</p>
            <p style="font-size: 16px; opacity: 0.8; max-width: 600px; margin: 0 auto; line-height: 1.5;">
                <strong>מיקה</strong> מתבססת על התוכן והניסיון שלנו באתר ותשמח לעזור עם המלצות ותכנון מסלולים.<br> 
                <strong>משה</strong> הוא מומחה התרבות שלנו, וישמח לענות על שאלות כלליות בנושאי היסטוריה ומסורת יפנית.
            </p>
        </div>

        <div class="chat-container">
            
            <div class="gemini-input-bar" id="input-bar-container">
                <input type="text" id="user-question" placeholder="יש לך שאלה למיקה?" oninput="checkInputStatus()" onkeypress="handleKeyPress(event)">
                
                <select id="agent-mode" class="agent-dropdown" onchange="updatePlaceholder()">
                    <option value="general">מיקה (טיולים)</option>
                    <option value="history">משה (היסטוריה)</option>
                </select>

                <button class="send-btn" onclick="askJapanAI()" aria-label="שלח">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 18l-6-6 6-6"/>
                    </svg>
                </button>
            </div>

            <div class="cf-turnstile" data-sitekey="0x4AAAAAADXKdZlgC1XjidId" data-appearance="interaction-only" style="margin-top: 15px; display: flex; justify-content: center;"></div>

            <div id="loading-msg" class="loading">המומחה שלנו מעבד את הנתונים, זה לוקח רגע...</div>
            <div id="ai-response"></div>
        </div>
    </section>

    <script>
        // 1. "השכמה שקטה" - מעירים את השרת ברגע שהעמוד נטען!
        // זה קורה ברקע ולא מפריע לגולש, ונותן לשרת זמן להתעורר
        window.addEventListener('DOMContentLoaded', () => {
            fetch('https://japan-ai-prod.onrender.com')
                .then(() => console.log('Server is awake!'))
                .catch(() => console.log('Wake up ping sent.'));
            // --- הקוד החדש: החלפת אימוג'י למשתמשי ווינדוס ---
            if (navigator.userAgent.indexOf("Win") !== -1) {
                document.getElementById('japan-emoji').innerText = '⛩️';
            }
            // ------------------------------------------------
        });

        // שינוי טקסט הפלייסחולדר
        function updatePlaceholder() {
            const mode = document.getElementById('agent-mode').value;
            const input = document.getElementById('user-question');
            if (mode === 'general') {
                input.placeholder = "יש לך שאלה למיקה?";
            } else {
                input.placeholder = "יש לך שאלה למשה?";
            }
            input.focus();
        }

        // הארת כפתור השליחה 
        function checkInputStatus() {
            const input = document.getElementById('user-question').value;
            const container = document.getElementById('input-bar-container');
            if (input.trim().length > 0) {
                container.classList.add('has-text');
            } else {
                container.classList.remove('has-text');
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                askJapanAI();
            }
        }

        async function askJapanAI() {
            const questionInput = document.getElementById('user-question').value;
            const modeSelect = document.getElementById('agent-mode').value;
            const responseDiv = document.getElementById('ai-response');
            const loadingMsg = document.getElementById('loading-msg');

            // --- 1. משיכת האסימון של Cloudflare ---
            const cfToken = document.querySelector('[name="cf-turnstile-response"]')?.value;

            if (!questionInput.trim()) return;

            // --- 2. חסימה אם אין אסימון ---
            if (!cfToken) {
                alert("מוודאים שאינך רובוט, אנא המתן שנייה ונסה שוב 🛡️");
                return;
            }

            responseDiv.innerHTML = '';
            loadingMsg.style.display = 'block';
            loadingMsg.innerHTML = 'המומחה שלנו מקבל את הנתונים, זה לוקח רגע...';

            let attempts = 0;
            const maxAttempts = 2;
            let success = false;
            let data = null;

            while (attempts < maxAttempts && !success) {
                try {
                    attempts++;
                    const response = await fetch('https://japan-ai-prod.onrender.com/ask', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify({
                            question: questionInput,
                            mode: modeSelect,
                            cf_token: cfToken // <-- 3. שליחת האסימון לשרת!
                        })
                    });

                    // בדיקה אם השרת דחה אותנו בגלל שהטקסט ארוך מדי (422)
                    if (response.status === 422) {
                        alert("ההודעה שלך ארוכה מדי! 😅\nאנא קצר אותה למקסימום 450 תווים ונסה שוב.");
                        loadingMsg.style.display = 'none';
                        turnstile.reset(); // איפוס במקרה של כישלון
                        return;
                    }

                    // בדיקה אם המשתמש חצה את מגבלת ה-5 שאלות ב-5 דקות (429)
                    if (response.status === 429) {
                        alert("התלהבנו! שאלת קצת יותר מדי שאלות ברצף 😅\nכדי לשמור על השרתים שלנו, אנא המתן 5 דקות ונסה שוב.");
                        loadingMsg.style.display = 'none';
                        turnstile.reset(); 
                        return;
                    }

                    if (!response.ok) throw new Error('שגיאה בתקשורת עם השרת');

                    data = await response.json();
                    success = true;

                } catch (error) {
                    console.warn(`Attempt ${attempts} failed.`, error);
                    
                    if (attempts >= maxAttempts) {
                        responseDiv.innerHTML = `<span style="color:#d9534f; font-weight:600; display:block; text-align:center; padding: 15px; background: rgba(217, 83, 79, 0.1); border-radius: 10px;">
                            אופס! נראה שהמומחים שלנו צריכים עוד רגע קטן כדי להתעורר. ☕<br>
                        <span style="font-size: 15px; font-weight: 400;">לפעמים לוקח למערכת כמה שניות נוספות לעלות. אנא המתינו 3-4 שניות ונסו לשלוח את השאלה שוב! אם הבעיה ממשיכה, נשמח לעזור לכם ישירות בפורום האתר.</span>
                        </span>`;
                        loadingMsg.style.display = 'none';
                        turnstile.reset(); // איפוס גם פה כדי שיוכל לנסות שוב
                        return;
                    }
                    
                    loadingMsg.innerHTML = 'מארגן את המידע עבורך, עוד רגע...';
                    await new Promise(resolve => setTimeout(resolve, 8000));
                }
            }

            // --- 4. איפוס הווידג'ט לקראת השאלה הבאה (מונע שליחת טוקן משומש) ---
            if (typeof turnstile !== 'undefined') {
                turnstile.reset();
            }

            if (success && data) {
                let textToFormat = "";
                if (Array.isArray(data.answer)) {
                    data.answer.forEach(item => {
                        if (typeof item === 'string') textToFormat += item;
                        else if (item && item.text) textToFormat += item.text;
                    });
                } else if (typeof data.answer === 'string') {
                    textToFormat = data.answer;
                } else {
                    textToFormat = "התקבלה תשובה בפורמט לא מוכר.";
                }

                let formattedAnswer = textToFormat;
                formattedAnswer = formattedAnswer.replace(/\n/g, '<br>');
                formattedAnswer = formattedAnswer.replace(/🔗/g, '<br><br>🔗<br>');
                formattedAnswer = formattedAnswer.replace(/(\s)(\d+\.\s)/g, '<br><br>$2');
                formattedAnswer = formattedAnswer.replace(/(?:\s|^)([-*])\s/g, '<br>• ');
                formattedAnswer = formattedAnswer.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                formattedAnswer = formattedAnswer.replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank" style="color: #3e7b73; font-weight: bold; text-decoration: underline;">$1</a>');
                formattedAnswer = formattedAnswer.replace(/(?<!href=")(:\/\/[^\s<]+)/g, function(url) {
                    let cleanUrl = url.replace(/[.,)]$/, ''); 
                    let title = "לכתבה המלאה לחץ כאן";
                    
                    if (cleanUrl.includes("backpackers-guide")) title = "למדריך המלא לתרמילאים ביפן";
                    else if (cleanUrl.includes("fuji")) title = "למדריך על אזור הר פוג'י";
                    else if (cleanUrl.includes("hiroshima-miyajima")) title = "למדריך על הירושימה ומיאג'ימה";
                    else if (cleanUrl.includes("japan-info")) title = "למידע כללי וטיפים חשובים ליפן";
                    else if (cleanUrl.includes("kamakura")) title = "למדריך על קמאקורה";
                    else if (cleanUrl.includes("kanazawa-shirakawa")) title = "למדריך על קנזאווה ושירקאווה-גו";
                    else if (cleanUrl.includes("kyoto-post")) title = "למדריך המקיף על קיוטו";
                    else if (cleanUrl.includes("mat-kiso-kam")) title = "למדריך על מצומוטו, עמק קיסו וקמיקוצ'י";
                    else if (cleanUrl.includes("nikko")) title = "למדריך על ניקו";
                    else if (cleanUrl.includes("okayama-naoshima")) title = "למדריך על אוקיאמה ונאושימה";
                    else if (cleanUrl.includes("osaka-post")) title = "למדריך על אוסקה וקובה";
                    else if (cleanUrl.includes("route-planning")) title = "למדריך תכנון מסלולים ביפן";
                    else if (cleanUrl.includes("tokyo-areas")) title = "למדריך השכונות והאזורים בטוקיו";
                    else if (cleanUrl.includes("tokyo")) title = "למדריך הכללי על טוקיו";
                    else if (cleanUrl.includes("uji-nara")) title = "למדריך על נארה ואוג'י";
                    
                    return `<a href="${cleanUrl}" target="_blank" style="color: #3e7b73; font-weight: bold; text-decoration: underline;">${title}</a>`;
                });

                formattedAnswer = formattedAnswer.replace(/^(<br>)+/, '');
                responseDiv.innerHTML = formattedAnswer;
                document.getElementById('user-question').value = '';
                checkInputStatus();
                loadingMsg.style.display = 'none';
            }
        }
    </script>

    <script src="menu.js"></script>

</body>
