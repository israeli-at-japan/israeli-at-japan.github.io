<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פורום שאלות ותשובות - ישראלי ביפן</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="canonical" href="https://israeli-in-japan.com/forum" />
    <meta name="description" content="פורום ישראלי ביפן - קהילת מטיילים. שאלות, התייעצויות והמלצות חמות ממטיילים על תכנון מסלול, תחבורה ואטרקציות ביפן. הצטרפו לדיון!">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* איפוס הגדרות בסיס ופונט */
        body, h1, h2, h3, p, ul, li { margin: 0; padding: 0; }
        body { font-family: 'Assistant', sans-serif; color: #3e7b73; line-height: 1.6; background-color: #f9fbfb; }
        a { text-decoration: none; color: inherit; }

        /* תפריט עליון */
        /* תפריט עליון - עדכנו פה את המיקום שיהיה דביק למחשב */
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 50px; 
            background: #fff; 
            border-bottom: 1px solid #eee; 
            position: sticky; /* הופך לדביק */
            top: 0; /* נדבק לחלק העליון */
            z-index: 1000; /* דואג שהוא תמיד ירחף מעל התוכן ולא יוסתר */
            }
            /* הסתרת תפריט הצד והכפתור במסכים גדולים */
            .side-menu, .floating-menu-btn { display: none; }
            .logo { font-size: 24px; font-weight: 600; color: #3e7b73; }
            nav ul { display: flex; list-style: none; gap: 20px; font-size: 17px; font-weight: 600; }
            nav ul li:hover { opacity: 0.7; cursor: pointer; }
            nav ul li a { color: #3e7b73; }

        #menu-placeholder {position: sticky; top: 0; z-index: 1000;}

        /* אזור הכותרת של הפורום */
        .forum-header { text-align: center; padding: 60px 20px 30px 20px; }
        .forum-header h1 { font-size: 42px; font-weight: 300; margin-bottom: 15px; color: #3e7b73; }
        .forum-header p { font-size: 20px; max-width: 600px; margin: 0 auto; color: #3e7b73; }

        /* אזור הדיון (המסגרת הלבנה של הפורום) */
        .forum-container { max-width: 800px; margin: 0 auto 60px auto; padding: 40px; background-color: #fff; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        /* התאמה למסכי טלפון */
        @media (max-width: 768px) {
            /* השארת הלוגו ממורכז למעלה והסתרת התפריט הרגיל */
            header { padding: 15px; text-align: center; display: block; }
            nav.desktop-nav { display: none; } /* מעלים את רשימת הקישורים בטלפון */
            #menu-placeholder {position: static; }/* הפקודה הזו מבטלת את הדביקות בנייד */

            .forum-header h1 { font-size: 32px; }
            .forum-header p { font-size: 18px; }
            .forum-container { margin: 0 15px 40px 15px; padding: 20px; }

            /* כפתור ההמבורגר הצף - ימין למעלה וממורכז */
            .floating-menu-btn {
                display: none; /* ישתנה ל-flex דרך ה-JS */
                position: fixed;
                bottom: 30px;
                right: 20px; /* שינינו לימינה */
                width: 55px;
                height: 55px;
                background-color: #3e7b73;
                color: #fff;
                border-radius: 50%;
                /* 3 השורות הבאות דואגות למרכוז מושלם של האייקון */
                display: flex; 
                justify-content: center;
                align-items: center;
                font-size: 26px;
                cursor: pointer;
                z-index: 999;
                box-shadow: 0 4px 15px rgba(0,0,0,0.2);
                transition: transform 0.2s;
            }
            .floating-menu-btn:active { transform: scale(0.95); }
        
            /* תפריט הצד המחליק */
            .side-menu {
                display: block; 
                position: fixed;
                top: 0;
                right: -300px;
                width: 260px;
                height: 100vh; /* גיבוי לדפדפנים ישנים */
                height: 100dvh; /* הגובה הדינמי החדש והמדויק */
                overflow-y: auto;
                overscroll-behavior: contain; /* מונע את ה"קפיץ" המעצבן של הטלפון */
                background-color: #fff;
                box-shadow: -5px 0 15px rgba(0,0,0,0.1);
                z-index: 1001; 
                transition: right 0.3s ease;
                padding-top: 60px;
                padding-bottom: 50px; /* מרווח נשימה כדי שהלינק האחרון לא ייתקע למטה */
            }
            /* "כרית אוויר" שקופה בתחתית הרשימה כדי לספוג את הקפיצות של ספארי */
            .side-menu ul::after {
                content: "";
                display: block;
                height: 53px; /* גובה הריבוע הבלתי נראה */
                width: 100%;
            }
            .side-menu.open { right: 0; }
            
            .side-menu ul { list-style: none; padding: 0; margin: 0; }
            .side-menu ul li { border-bottom: 1px solid #f5f5f5; }
            .side-menu ul li a {
                color: #3e7b73;
                font-size: 18px;
                font-weight: 600;
                display: block;
                padding: 15px 25px;
            }
            .side-menu-close {
                position: absolute;
                top: 15px;
                left: 20px;
                font-size: 35px;
                color: #333;
                cursor: pointer;
                line-height: 1;
            }
        }

        /* הקפאת גלילה של האתר כשהתפריט מובייל פתוח */
        body.no-scroll {
        overflow: hidden;
        }

    </style>

    </head>
<body>

    <div id="menu-placeholder"></div>

    <main>
        <section class="forum-header">
            <h1>פורום שאלות ותשובות</h1>
            <p>מתכננים טיול ליפן ויש לכם שאלות? חזרתם מיפן ובא לכם לחלוק טיפ מנצח? הגעתם למקום הנכון! תרגישו חופשי לשאול, לענות, ולעזור אחד לשנייה לתכנן את הטיול המושלם.</p>
        </section>

        <section class="forum-container">
            <div style="max-width: 800px; margin: 50px auto; padding: 0 20px;">

    <script src="menu.js"></script>
